name: Update rates

on:
  schedule:
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-rates
  cancel-in-progress: false

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch rates
        id: fetch-rates
        continue-on-error: true
        run: |
          set +e
          node scripts/fetch-rates.mjs
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Commit public output
        run: |
          git add public
          git diff --cached --quiet || (
            git config user.name "github-actions[bot]" &&
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com" &&
            git commit -m "Update rates" &&
            git push
          )

      - name: Fail on fetch error
        if: steps.fetch-rates.outputs.exit_code != '0'
        run: exit "${{ steps.fetch-rates.outputs.exit_code }}"
